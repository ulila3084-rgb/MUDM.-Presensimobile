name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build React & Capacitor Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Node Dependencies
        run: |
          echo "Installing dependencies with legacy-peer-deps to prevent React 19 conflicts..."
          npm install --legacy-peer-deps

      - name: Build React Web App
        run: |
          echo "Building React Vite Web Application..."
          npm run build

      - name: Initialize Capacitor Android Platform
        run: |
          echo "Ensuring a fresh, clean Android directory exists..."
          if [ -d "android" ]; then
            rm -rf android
          fi
          npx cap add android
          npx cap sync

      - name: Grant Execute Permission for Gradle
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          echo "Running Gradle assembleDebug..."
          ./gradlew assembleDebug

      - name: Debug Output Directory (On Failure/Success)
        if: always()
        run: |
          echo "Listing Android build output folder if it exists..."
          ls -R android/app/build/outputs/ || echo "No output folder found yet."

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Presensi-MUDM-Android-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

