name: Cek Struktur Proyek

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: List Semua File dan Folder
      run: |
        echo "=== DAFTAR FOLDER DI ROOT ==="
        ls -la
        echo "============================="
        echo "=== MENCARI FILE PENTING ==="
        find . -maxdepth 3 -not -path '*/.*'
