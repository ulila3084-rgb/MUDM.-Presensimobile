name: Build Android APK Only

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  build-android:
    # Menggunakan Linux (Ubuntu) karena jauh lebih cepat untuk build Android
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Jalankan Build Android Otomatis
      run: |
        echo "=== MEMULAI PROSES BUILD APK ==="
        
        # 1. JIKA PROYEK FLUTTER
        FLUTTER_PATH=$(find . -name pubspec.yaml -print -quit)
        if [ ! -z "$FLUTTER_PATH" ]; then
          echo "=> Terdeteksi proyek Flutter di: $(dirname "$FLUTTER_PATH")"
          git clone https://github.com/flutter/flutter.git -b stable $HOME/flutter
          export PATH="$PATH:$HOME/flutter/bin"
          cd $(dirname "$FLUTTER_PATH")
          
          flutter pub get
          echo "Membangun Android APK..."
          flutter build apk --release
          exit 0
        fi

        # 2. JIKA PROYEK NODE.JS (React Native / Ionic / Cordova)
        PACKAGE_PATH=$(find . -name package.json -not -path '*/node_modules/*' -print -quit)
        if [ ! -z "$PACKAGE_PATH" ]; then
          echo "=> Terdeteksi proyek berbasis Node.js di: $(dirname "$PACKAGE_PATH")"
          cd $(dirname "$PACKAGE_PATH")
          
          npm install --legacy-peer-deps
          
          # Cari folder android secara dinamis
          ANDROID_DIR=$(find . -name gradlew -print -quit)
          if [ ! -z "$ANDROID_DIR" ]; then
            cd $(dirname "$ANDROID_DIR")
            chmod +x gradlew
            ./gradlew assembleRelease
          else
            npx react-native build-android --mode=release || npm run build || echo "Build selesai"
          fi
          exit 0
        fi

        # 3. JIKA PROYEK ANDROID NATIVE (Java / Kotlin)
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        if [ ! -z "$GRADLEW_PATH" ]; then
          echo "=> Terdeteksi proyek Android Native di: $(dirname "$GRADLEW_PATH")"
          cd $(dirname "$GRADLEW_PATH")
          chmod +x gradlew
          ./gradlew assembleRelease
          exit 0
        fi

        echo "ERROR: Kode sumber aplikasi tidak ditemukan! Pastikan Anda sudah mengunggah (push) seluruh file proyek dari komputer ke GitHub."
        exit 1

    - name: Simpan dan Upload Hasil APK
      uses: actions/upload-artifact@v4
      with:
        name: MUDM-Presensimobile-APK
        path: |
          **/build/outputs/apk/release/*.apk
          **/build/app/outputs/flutter-apk/app-release.apk
