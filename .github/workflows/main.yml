name: Flutter Build CI

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Deteksi Folder Proyek Flutter
      run: |
        PUBSPEC_PATH=$(find . -name pubspec.yaml -print -quit)
        if [ -z "$PUBSPEC_PATH" ]; then
          echo "ERROR: File pubspec.yaml tidak ditemukan! Apakah ini proyek Flutter?"
          exit 1
        fi
        FLUTTER_DIR=$(dirname "$PUBSPEC_PATH")
        echo "Proyek Flutter ditemukan di folder: $FLUTTER_DIR"
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: Ambil Dependencies
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter pub get

    - name: Build APK Release
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: |
          **/build/app/outputs/flutter-apk/app-release.apk
          **/build/app/outputs/apk/release/app-release.apk
