name: Android Build CI

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Cari dan Berikan Izin Eksekusi gradlew
      run: |
        GRADLEW_PATH=$(find . -name gradlew -print -quit)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "ERROR: File gradlew tidak ditemukan di folder mana pun!"
          exit 1
        fi
        echo "gradlew ditemukan di: $GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        # Menyimpan folder gradlew agar bisa digunakan di langkah berikutnya
        echo "GRADLE_DIR=$(dirname "$GRADLEW_PATH")" >> $GITHUB_ENV

    - name: Build APK (Release)
      run: |
        cd ${{ env.GRADLE_DIR }}
        ./gradlew assembleRelease

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-release-apk
        path: |
          **/build/outputs/apk/release/*.apk
