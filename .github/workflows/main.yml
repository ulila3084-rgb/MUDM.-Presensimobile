name: Investigasi Isi Repositori

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Tampilkan Semua Daftar File dan Folder
      run: |
        echo "=== POSISI SEKARANG ==="
        pwd
        echo "=== DAFTAR FILE DI ROOT ==="
        ls -la
        echo "=== STRUKTUR POHON FOLDER ==="
        find . -maxdepth 3 -not -path '*/.*'
