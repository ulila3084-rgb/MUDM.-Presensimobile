name: Buat APK Android Presensi

on:
  push:
    branches: [ "utama", "main" ]
  pull_request:
    branches: [ "utama", "main" ]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
    - name: Ambil Kode dari Repositori
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Buat Struktur Proyek Android Otomatis
      run: |
        echo "=== MEMBUAT PROYEK ANDROID WEBVIEW ==="
        # 1. Tentukan URL Google Apps Script Anda di sini:
        APPS_SCRIPT_URL="1wIWZeJdApkz37ntOEq9abKpld222amKA2BjBNqTvz8w"
        
        # 2. Membuat folder struktur Android dasar
        mkdir -p app/src/main/java/com/mudm/presensimobile
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/values
        
        # 3. Membuat file settings.gradle & build.gradle di root
        echo "include ':app'" > settings.gradle
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF

        # 4. Membuat build.gradle milik aplikasi
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.mudm.presensimobile'
            compileSdk 34
            defaultConfig {
                applicationId "com.mudm.presensimobile"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        EOF

        # 5. Membuat AndroidManifest.xml (Izin Internet)
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <application
                android:label="MUDM Presensi"
                android:theme="@android:style/Theme.DeviceDefault.NoActionBar"
                android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        # 6. Membuat Layout Tampilan (XML)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <WebView xmlns:android="http://schemas.android.com/apk/res/android"
            android:id="@+id/webview"
            android:layout_width="match_parent"
            android:layout_height="match_parent" />
        EOF

        # 7. Membuat Kode Utama Java (Menghubungkan ke URL Apps Script)
        cat << EOF > app/src/main/java/com/mudm/presensimobile/MainActivity.java
        package com.mudm.presensimobile;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;

        public class MainActivity extends Activity {
            @Override
            protected void Bundle) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);
                WebView webView = findViewById(R.id.webview);
                WebSettings webSettings = webView.getSettings();
                webSettings.setJavaScriptEnabled(true);
                webSettings.setDomStorageEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("$APPS_SCRIPT_URL");
            }
        }
        EOF

        # 8. Menyiapkan Gradle Wrapper agar bisa di-build langsung
        gradle wrapper --gradle-version 8.5

    - name: Kompilasi Menjadi APK Android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload dan Amankan File APK
      uses: actions/upload-artifact@v4
      with:
        name: Presensi-MUDM-Android-APK
        path: app/build/outputs/apk/debug/app-debug.apk
